model:
  d_model: 512
  n_layer: 12
  d_state: 16
  d_conv: 4
  expand: 2
  max_position_embeddings: 512
  dropout: 0.1
  pad_token_id: 0
  gradient_checkpointing: true   # required to fit on 11GB cards

training:
  batch_size: 8
  grad_accum_steps: 8
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 10000
  max_steps: 200000
  mlm_probability: 0.15
  fp16: true                    # Turing (2080Ti) has no real bf16 support, use fp16
  seed: 42
  save_steps: 5000
  log_steps: 100
  num_workers: 8

data:
  tokenizer_name: "aubmindlab/bert-base-arabertv02"  # vocab_size=64000, taken from tokenizer at runtime
  train_dir: "outputs/data/train"   # dir of shard_*.txt, produced by prepare_data.py
  val_dir: "outputs/data/val"
  max_seq_length: 512

paths:
  output_dir: "outputs"
  checkpoint_dir: "checkpoint"
  logs_dir: "logs"
  results_dir: "results"

distributed:
  num_gpus: 4
  backend: "nccl"
